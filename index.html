<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Web App</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            text-align: center;
            margin-top: 50px;
            background: #f0f2f5;
        }
        .container {
            background: white;
            max-width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { color: #1a73e8; }
        .count {
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
        }
        button {
            font-size: 20px;
            padding: 10px 20px;
            margin: 0 10px;
            cursor: pointer;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
        }
        button:hover { background: #0d5bbf; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Counter Web App</h1>
        <div class="count" id="countDisplay">0</div>
        <button onclick="changeCount(1)">+1</button>
        <button onclick="changeCount(-1)">-1</button>
        <button onclick="resetCount()">Reset</button>
    </div>
    <script>
        let count = 0;
        const display = document.getElementById("countDisplay");
        function changeCount(delta) {
            count += delta;
            display.innerText = count;
        }
        function resetCount() {
            count = 0;
            display.innerText = count;
        }
    </script>
</body>
</html>
